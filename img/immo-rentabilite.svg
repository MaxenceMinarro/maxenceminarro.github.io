<svg viewBox="0 0 400 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Aperçu Rentabilité locative">
  <defs>
    <linearGradient id="rentBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFCF7"/>
      <stop offset="1" stop-color="#F5F0E8"/>
    </linearGradient>
    <linearGradient id="rentArea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1E6091" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#1E6091" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#rentBg)"/>
  <circle cx="350" cy="200" r="65" fill="#1E6091" opacity="0.06"/>
  <circle cx="50" cy="40" r="50" fill="#C17F59" opacity="0.07"/>
  <!-- carte -->
  <g transform="translate(56,52)">
    <rect x="0" y="0" width="288" height="136" rx="12" fill="#FFFFFF" stroke="#E8E2D9" stroke-width="1.5"/>
    <!-- courbe loué -->
    <path d="M20 110 L70 92 L120 96 L170 60 L220 48 L268 24 L268 116 L20 116 Z" fill="url(#rentArea)"/>
    <path d="M20 110 L70 92 L120 96 L170 60 L220 48 L268 24" fill="none" stroke="#1E6091" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- ligne non loué -->
    <path d="M20 112 L268 100" fill="none" stroke="#C17F59" stroke-width="2.5" stroke-dasharray="6 6" stroke-linecap="round"/>
    <circle cx="268" cy="24" r="5" fill="#1E6091"/>
    <!-- maison badge -->
    <g transform="translate(20,16)">
      <path d="M14 0 L28 11 L24 11 L24 30 L4 30 L4 11 L0 11 Z" fill="#1E6091" opacity="0.85"/>
    </g>
  </g>
  <text x="200" y="222" font-family="Outfit, sans-serif" font-size="14" font-weight="600" fill="#5D6D7E" text-anchor="middle" letter-spacing="1">RENTABILITÉ LOCATIVE</text>
</svg>
