<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFCF7"/>
      <stop offset="1" stop-color="#F5F0E8"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4A90B8"/>
      <stop offset="1" stop-color="#1E6091"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1080" cy="90" r="220" fill="#1E6091" opacity="0.06"/>
  <circle cx="120" cy="560" r="170" fill="#C17F59" opacity="0.08"/>
  <path d="M860 540 a160 160 0 0 1 320 0 Z" fill="none" stroke="#1E6091" stroke-width="3" opacity="0.12"/>

  <!-- Logo M. -->
  <text x="100" y="180" font-family="Georgia, 'Cormorant Garamond', serif" font-size="86" font-weight="700" fill="#2C3E50">M<tspan fill="#1E6091">.</tspan></text>

  <!-- Tag -->
  <g transform="translate(100,250)">
    <rect x="0" y="0" width="270" height="52" rx="26" fill="#FFFFFF"/>
    <circle cx="34" cy="26" r="7" fill="#1E6091"/>
    <text x="56" y="34" font-family="'Outfit', Arial, sans-serif" font-size="20" font-weight="600" fill="#5D6D7E">Développeur Web</text>
  </g>

  <!-- Nom -->
  <text x="96" y="430" font-family="Georgia, 'Cormorant Garamond', serif" font-size="104" font-weight="700" fill="#2C3E50">Maxence Minarro<tspan fill="#1E6091">.</tspan></text>

  <!-- Sous-titre -->
  <text x="100" y="500" font-family="'Outfit', Arial, sans-serif" font-size="30" fill="#5D6D7E">Applications web &amp; sites sur mesure — Nîmes (30)</text>

  <!-- Pastilles techno -->
  <g font-family="'Outfit', Arial, sans-serif" font-size="22" font-weight="500">
    <g transform="translate(100,540)"><rect width="118" height="46" rx="10" fill="#FFFFFF"/><text x="59" y="30" fill="#2C3E50" text-anchor="middle">React</text></g>
    <g transform="translate(232,540)"><rect width="118" height="46" rx="10" fill="#FFFFFF"/><text x="59" y="30" fill="#2C3E50" text-anchor="middle">PHP</text></g>
    <g transform="translate(364,540)"><rect width="138" height="46" rx="10" fill="#FFFFFF"/><text x="69" y="30" fill="#2C3E50" text-anchor="middle">Python</text></g>
    <g transform="translate(516,540)"><rect width="160" height="46" rx="10" fill="url(#acc)"/><text x="80" y="30" fill="#FFFFFF" text-anchor="middle">TypeScript</text></g>
  </g>
