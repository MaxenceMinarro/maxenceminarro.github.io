<svg viewBox="0 0 400 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Aperçu Simulateur impôts micro">
  <defs>
    <linearGradient id="impBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFCF7"/>
      <stop offset="1" stop-color="#F5F0E8"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#impBg)"/>
  <circle cx="340" cy="50" r="70" fill="#1E6091" opacity="0.06"/>
  <circle cx="50" cy="200" r="55" fill="#C17F59" opacity="0.07"/>
  <!-- Donut chart régimes -->
  <g transform="translate(130,120)">
    <circle cx="0" cy="0" r="58" fill="none" stroke="#E8E2D9" stroke-width="22"/>
    <!-- segments -->
    <circle cx="0" cy="0" r="58" fill="none" stroke="#1E6091" stroke-width="22"
            stroke-dasharray="146 218" transform="rotate(-90)"/>
    <circle cx="0" cy="0" r="58" fill="none" stroke="#4A90B8" stroke-width="22"
            stroke-dasharray="91 273" stroke-dashoffset="-146" transform="rotate(-90)"/>
    <circle cx="0" cy="0" r="58" fill="none" stroke="#C17F59" stroke-width="22"
            stroke-dasharray="73 291" stroke-dashoffset="-237" transform="rotate(-90)"/>
    <text x="0" y="9" font-family="Georgia, serif" font-size="30" font-weight="600" fill="#2C3E50" text-anchor="middle">%</text>
  </g>
  <!-- Légende régimes -->
  <g transform="translate(228,78)" font-family="Outfit, sans-serif" font-size="13" fill="#5D6D7E">
    <rect x="0" y="0" width="12" height="12" rx="3" fill="#1E6091"/>
    <text x="20" y="11">Micro-BIC</text>
    <rect x="0" y="26" width="12" height="12" rx="3" fill="#4A90B8"/>
    <text x="20" y="37">Réel / IR</text>
    <rect x="0" y="52" width="12" height="12" rx="3" fill="#C17F59"/>
    <text x="20" y="63">EURL / SASU</text>
  </g>
  <text x="200" y="222" font-family="Outfit, sans-serif" font-size="14" font-weight="600" fill="#5D6D7E" text-anchor="middle" letter-spacing="1">IMPÔTS &amp; COTISATIONS</text>
</svg>
