  </defs>
  <rect width="400" height="240" fill="url(#marchBg)"/>
  <circle cx="60" cy="40" r="70" fill="#1E6091" opacity="0.06"/>
  <circle cx="360" cy="200" r="60" fill="#C17F59" opacity="0.08"/>
