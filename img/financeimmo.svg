<svg viewBox="0 0 480 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Aperçu FinanceImmo — tableau de bord immobilier">
  <defs>
    <linearGradient id="fiBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFCF7"/>
      <stop offset="1" stop-color="#F5F0E8"/>
    </linearGradient>
    <linearGradient id="fiAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4A90B8"/>
      <stop offset="1" stop-color="#1E6091"/>
    </linearGradient>
    <linearGradient id="fiArea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1E6091" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#1E6091" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="480" height="320" fill="url(#fiBg)"/>
  <circle cx="60" cy="50" r="80" fill="#1E6091" opacity="0.05"/>
  <circle cx="430" cy="280" r="70" fill="#C17F59" opacity="0.07"/>

  <!-- Carte tableau de bord -->
  <g transform="translate(48,46)">
    <rect x="0" y="0" width="280" height="180" rx="14" fill="#FFFFFF" stroke="#E8E2D9" stroke-width="1.5"/>
    <!-- entête -->
    <rect x="20" y="20" width="120" height="9" rx="4" fill="url(#fiAccent)"/>
    <rect x="20" y="36" width="74" height="6" rx="3" fill="#D4C4A8"/>

    <!-- KPI cards -->
    <g transform="translate(20,58)">
      <rect x="0"  y="0" width="78" height="48" rx="8" fill="#F5F0E8"/>
      <rect x="10" y="10" width="40" height="6" rx="3" fill="#8E9EAB"/>
      <rect x="10" y="24" width="54" height="12" rx="4" fill="#1E6091"/>

      <rect x="90" y="0" width="78" height="48" rx="8" fill="#F5F0E8"/>
      <rect x="100" y="10" width="36" height="6" rx="3" fill="#8E9EAB"/>
      <rect x="100" y="24" width="48" height="12" rx="4" fill="#C17F59"/>
    </g>

    <!-- mini courbe tendance -->
    <g transform="translate(20,120)">
      <path d="M0 40 L40 30 L80 34 L120 16 L160 22 L200 4 L240 4 L240 48 L0 48 Z" fill="url(#fiArea)"/>
      <path d="M0 40 L40 30 L80 34 L120 16 L160 22 L200 4" fill="none" stroke="#1E6091" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="200" cy="4" r="5" fill="#1E6091"/>
    </g>
  </g>

  <!-- Badge maison + euro -->
  <g transform="translate(360,150)">
    <circle cx="0" cy="0" r="52" fill="#FFFFFF" stroke="#E8E2D9" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="52" fill="none" stroke="url(#fiAccent)" stroke-width="6" stroke-dasharray="245 82" stroke-linecap="round" transform="rotate(-90)"/>
    <g transform="translate(-22,-26)">
      <path d="M22 0 L44 17 L38 17 L38 40 L6 40 L6 17 L0 17 Z" fill="#1E6091" opacity="0.92"/>
      <rect x="17" y="22" width="11" height="18" fill="#FFFCF7"/>
    </g>
    <text x="0" y="34" font-family="Georgia, serif" font-size="22" font-weight="600" fill="#1E6091" text-anchor="middle">€</text>
  </g>

  <text x="240" y="296" font-family="Outfit, sans-serif" font-size="15" font-weight="600" fill="#5D6D7E" text-anchor="middle" letter-spacing="1">ANALYSE D'OPPORTUNITÉS IMMO</text>
</svg>
